server:
  port: 8080

spring:
  application:
    name: music-platform

  # SQLite 数据源配置
  datasource:
    url: jdbc:sqlite:music_platform.db
    driver-class-name: org.sqlite.JDBC

  # JPA 配置
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update   # 自动建表，开发阶段方便
    show-sql: false       # 调试时可改为 true

  # 静态文件访问（由 WebConfig.java 管理映射，此处仅保留 classpath 默认路径）
  web:
    resources:
      static-locations: classpath:/static/

  # Jackson JSON 配置
  jackson:
    serialization:
      write-dates-as-timestamps: false

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# 输出文件目录
music-platform:
  output-dir: ./outputs
